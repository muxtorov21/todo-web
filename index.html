<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Persistent State</title>
	<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen p-4 sm:p-8">

	<div class="bg-white w-full max-w-md mx-auto p-6 rounded-2xl shadow-xl">
		<div class="flex gap-2">
			<p id="advice-text"></p>
		</div>
		<button id="new-advice"
			class="bg-green-600 my-5 hover:bg-pink-700 text-white font-bold py-3 px-6 rounded-2xl transition-all active:scale-95">
			New advice
		</button>
		<h1 class="text-2xl font-bold text-gray-800 mb-6 text-center">Vazifalar</h1>

		<div>
			<input type="text" id="todo-value"
				class="flex-1  border border-gray-300 p-3 max-sm:w-[200px] rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 text-lg"
				placeholder="Yangi vazifa...">
			<button id="todo-add"
				class="bg-blue-600 my-5  hover:bg-gray-700 text-white font-bold py-3 px-6 max-sm:py-3 max-sm:px-3   rounded-2xl transition-all active:scale-95">
				Qo'shish
			</button>
		</div>
		<div class="flex justify-center gap-2 mb-4">
			<button onclick="setFilter('all')" id="all"
				class="text-xs bg-blue-200 px-3 py-1 rounded-full active:scale-95 transition-all">Hammasi</button>
			<button onclick="setFilter('completed')" id="completed"
				class="text-xs bg-green-100 text-green-700 px-3 py-1 rounded-full active:scale-95 transition-all">Bajarilgan</button>
			<button onclick="setFilter('pending')" id="pending"
				class="text-xs bg-yellow-100 text-yellow-700 px-3 py-1 rounded-full active:scale-95 transition-all">Kutilmoqda</button>
		</div>

		<ul id="todo-list" class="space-y-3"></ul>

		<div>
			<img src="" alt="" class="w-full mx-auto my-5 max-w-[300px]" id="dog-img">
			<button id="new-dog"
				class="bg-yellow-600 my-5 hover:bg-red-700 text-white font-bold py-3 px-6 rounded-2xl transition-all active:scale-95">
				New dog
			</button>

			<div>
				<h3 id="owner"></h3>
				<img src="" alt="" id="owner-img">
				<p id="owner-name" class="text-lg"></p>
			</div>
		</div>
	</div>

	<script src="main.js"></script>
</body>

</html>
