<!DOCTYPE html>
<html lang="uz">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>To-Do App</title>
	<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen p-4 sm:p-8">

	<div class="bg-white w-full max-w-md mx-auto p-6 rounded-2xl shadow-xl">
		<h1 class="text-2xl font-bold text-gray-800 mb-6 text-center">Vazifalar</h1>

		<div class="flex flex-col sm:flex-row gap-2 mb-6">
			<input type="text" id="todo-value"
				class="flex-1 border border-gray-300 p-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 text-lg"
				placeholder="Yangi vazifa...">
			<button id="todo-add"
				class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-xl transition-all active:scale-95">
				Qo'shish
			</button>
		</div>

		<ul id="todo-list" class="space-y-3"></ul>
	</div>

	<script src="main.js"></script>
</body>

</html>
